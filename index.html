<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPD | CC2026 AI Intel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #030712; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .table-container { max-height: 55vh; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 10; background-color: #111827; }
        .badge-active { background: #065f46; color: #34d399; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; }
        input[type="number"], input[type="text"], select { 
            background: #0f172a; color: white; border: 1px solid #334155; 
            border-radius: 4px; padding: 2px 4px; font-size: 10px; outline: none;
        }
        select option { background-color: #0f172a; }
        
        /* Estilos IA Response */
        .ai-response strong { color: #c084fc; font-weight: 900; }
        .ai-response p { margin-bottom: 0.75rem; }
        .ai-response ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
        .ai-response li { margin-bottom: 0.4rem; line-height: 1.4; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1800px] mx-auto">
        <div class="glass flex flex-col md:flex-row justify-between items-center p-4 rounded-2xl mb-6 border-b-4 border-blue-600 gap-4 shadow-2xl">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-400">GPD <span class="text-blue-500">CC2026</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1 tracking-widest">Advanced Media AI Insights ✨</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-xl border border-slate-700">
                <select id="client_selector" class="bg-black text-blue-400 text-sm font-bold p-2 rounded-lg border border-slate-800 focus:border-blue-500 min-w-[150px]"></select>
                <button onclick="addNewClient()" class="bg-slate-800 hover:bg-blue-600 text-white font-bold w-10 h-10 rounded-lg">+</button>
                <button onclick="deleteCurrentClient()" class="bg-slate-800 hover:bg-red-600 text-red-400 hover:text-white font-bold w-10 h-10 rounded-lg">✕</button>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden border border-slate-800 shadow-2xl mb-6">
            <div class="bg-slate-900 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-[10px] font-bold text-white uppercase tracking-widest">Data Management: <span id="lbl_client" class="text-blue-400">...</span></h2>
                <button onclick="addNewCampaignManual()" class="text-[9px] bg-blue-900/40 hover:bg-blue-600 text-blue-300 px-3 py-1 rounded font-bold uppercase transition-all">+ Añadir Manual</button>
            </div>
            <div class="table-container">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="text-[9px] text-slate-400 uppercase tracking-wider font-bold">
                        <tr class="bg-slate-900/80">
                            <th class="px-4 py-4 pl-6">Mes</th>
                            <th class="px-4 py-4">Campaña</th>
                            <th class="px-4 py-4 text-center">Tipo</th>
                            <th class="px-4 py-4 text-right">Inv. Plan</th>
                            <th class="px-4 py-4 text-right">Inv. Real</th>
                            <th class="px-4 py-4 text-right">Var %</th>
                            <th class="px-4 py-4 text-right">KPI Real</th>
                            <th class="px-4 py-4 text-center pr-6">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="table_body" class="divide-y divide-slate-800 text-[10px] text-slate-300"></tbody>
                </table>
            </div>
        </div>

        <div class="glass rounded-2xl p-6 border-l-4 border-purple-500 shadow-2xl relative">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-purple-400 rounded-full animate-ping"></div>
                    <h3 class="text-lg font-black text-white uppercase tracking-widest">Auditoría Estratégica AI</h3>
                </div>
                <button onclick="forceAIUpdate()" class="text-[10px] bg-purple-900/50 hover:bg-purple-600 text-purple-200 px-4 py-2 rounded-lg font-bold uppercase transition-all shadow-lg">Ejecutar Análisis con Gemini Pro</button>
            </div>
            <div id="ai_insights_container" class="text-sm text-slate-300 bg-slate-900/80 p-5 rounded-xl border border-slate-800 ai-response min-h-[100px]">
                <p class="italic text-slate-500 text-center">Haz clic en el botón para que la IA analice el rendimiento de esta cuenta.</p>
            </div>
        </div>
    </div>

    <script>
        // --- API KEY INTEGRADA ---
        const GEMINI_API_KEY = "AIzaSyCYmlvcDxkaO5FUKzBIc-ixthXVsRttFSY"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCh5fkwDR1Jd1KJoPVEwY8gazJI85s2-wE",
            authDomain: "gpd-cc2026.firebaseapp.com",
            projectId: "gpd-cc2026",
            storageBucket: "gpd-cc2026.firebasestorage.app",
            databaseURL: "https://gpd-cc2026-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalDatabase = [];
        let currentClientData = []; 

        const clientSelector = document.getElementById('client_selector');
        const tableBody = document.getElementById('table_body');

        // Carga de Clientes
        db.ref('lista_clientes').on('value', s => {
            const list = s.val() || [];
            const cur = clientSelector.value;
            clientSelector.innerHTML = '';
            list.forEach(c => {
                let opt = document.createElement('option'); opt.value = c; opt.textContent = c;
                clientSelector.appendChild(opt);
            });
            if(cur) clientSelector.value = cur;
            renderTable();
        });

        db.ref('data_marketing').on('value', s => {
            globalDatabase = s.val() ? Object.values(s.val()) : [];
            renderTable();
        });

        function renderTable() {
            tableBody.innerHTML = '';
            const cur = clientSelector.value;
            document.getElementById('lbl_client').innerText = cur || "Seleccione cuenta";
            currentClientData = globalDatabase.filter(c => c.client === cur);
            
            currentClientData.forEach(c => {
                const varInv = c.spend_plan > 0 ? (c.spend_real / c.spend_plan) * 100 : 0;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/40 transition-all";
                tr.innerHTML = `
                    <td class="px-4 py-3 pl-6 text-slate-500">${c.month || 'N/A'}</td>
                    <td class="px-4 py-3 font-bold text-white">${c.name}</td>
                    <td class="px-4 py-3 text-center text-blue-400 font-mono text-[9px]">${c.type || 'CPM'}</td>
                    <td class="px-4 py-3 text-right">$${(c.spend_plan||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-right text-blue-400 font-bold">$${(c.spend_real||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-right font-bold ${varInv > 105 ? 'text-red-400' : 'text-emerald-400'}">${varInv.toFixed(1)}%</td>
                    <td class="px-4 py-3 text-right font-mono">${(c.kpi_real||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-center pr-6"><button onclick="deleteRow(${c.id})" class="text-slate-600 hover:text-red-500">✕</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        async function forceAIUpdate() {
            const container = document.getElementById('ai_insights_container');
            if(!currentClientData.length) return alert("Primero carga o selecciona datos para analizar.");
            
            container.innerHTML = '<p class="animate-pulse text-purple-400 font-bold italic text-center">🤖 Gemini Pro está auditando tus métricas en tiempo real...</p>';
            
            const resumen = currentClientData.map(c => `- ${c.name}: Plan $${c.spend_plan}, Real $${c.spend_real}, Logro Inv: ${((c.spend_real/(c.spend_plan||1))*100).toFixed(1)}%`).join('\n');
            const prompt = `Actúa como Media Director Senior. Analiza estos datos de presupuesto de forma crítica y estratégica. Da 3 recomendaciones tácticas de optimización (pacing, sobregiros o ahorro) con emojis. Usa HTML (ul, li, strong):\n${resumen}`;

            try {
                // Intento con Pro, si falla (por cuotas o permisos) usa Flash automáticamente
                let model = "gemini-1.5-pro";
                let response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                if (!response.ok) {
                    model = "gemini-1.5-flash"; // Fallback a Flash
                    response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                }

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                container.innerHTML = `<div class="text-[11px] text-slate-500 mb-2 uppercase font-bold tracking-tighter">Analizado con: ${model}</div>` + data.candidates[0].content.parts[0].text.replace(/```html|```/g, '');
            } catch (e) {
                container.innerHTML = `<div class="bg-red-900/30 p-4 rounded-lg border border-red-500/50 text-red-200 text-xs">⚠️ **Error de Conexión:** ${e.message}<br><br>Sugerencia: Verifica que la API Key no tenga restricciones de IP/Dominio incorrectas en Google Cloud.</div>`;
            }
        }

        function deleteRow(id) { if(confirm("¿Borrar línea?")) { globalDatabase = globalDatabase.filter(x => x.id != id); db.ref('data_marketing').set(globalDatabase); } }
        function addNewClient() { let n = prompt("Nombre del cliente:"); if(n) db.ref('lista_clientes').once('value', s => { let l=s.val()||[]; l.push(n.toUpperCase()); db.ref('lista_clientes').set(l); }); }
        function deleteCurrentClient() { if(confirm(`¿Borrar ${clientSelector.value}?`)) db.ref('lista_clientes').once('value', s => db.ref('lista_clientes').set((s.val()||[]).filter(c=>c!==clientSelector.value))); }
        function addNewCampaignManual() { const name = prompt("Nombre de campaña:"); if(name) { globalDatabase.push({ id: Date.now(), client: clientSelector.value, name, month: "N/A", spend_plan: 0, spend_real: 0, kpi_real: 0 }); db.ref('data_marketing').set(globalDatabase); } }
        clientSelector.onchange = renderTable;
    </script>
</body>
</html>
