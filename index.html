<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPD | CC2026 AI Auto-Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #030712; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .table-container { max-height: 55vh; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 10; background-color: #111827; }
        .badge-active { background: #065f46; color: #34d399; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; }
        input[type="number"], input[type="text"], select { 
            background: #0f172a; color: white; border: 1px solid #334155; 
            border-radius: 4px; padding: 2px 4px; font-size: 10px; outline: none;
        }
        
        .ai-response strong { color: #c084fc; font-weight: 900; }
        .ai-response ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
        .ai-response li { margin-bottom: 0.4rem; line-height: 1.4; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1800px] mx-auto">
        <div class="glass flex flex-col md:flex-row justify-between items-center p-4 rounded-2xl mb-6 border-b-4 border-blue-600 gap-4 shadow-2xl">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-400">GPD <span class="text-blue-500">CC2026</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">Dynamic AI Model Selector Enabled 🤖</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-xl border border-slate-700 shadow-inner">
                <select id="client_selector" class="bg-black text-blue-400 text-sm font-bold p-2 rounded-lg border border-slate-800 focus:border-blue-500 min-w-[150px]"></select>
                <button onclick="addNewClient()" class="bg-slate-800 hover:bg-blue-600 text-white font-bold w-10 h-10 rounded-lg transition-all shadow-lg">+</button>
                <button onclick="deleteCurrentClient()" class="bg-slate-800 hover:bg-red-600 text-red-400 hover:text-white font-bold w-10 h-10 rounded-lg transition-all shadow-lg">✕</button>
            </div>
        </div>

        <div class="glass rounded-2xl overflow-hidden border border-slate-800 shadow-2xl mb-6">
            <div class="bg-slate-900 px-4 py-3 border-b border-slate-800 flex justify-between items-center">
                <h2 class="text-[10px] font-bold text-white uppercase tracking-widest">Dataset: <span id="lbl_client" class="text-blue-400">...</span></h2>
                <div class="flex gap-2">
                    <button onclick="getAvailableModels()" class="text-[9px] bg-emerald-900/40 hover:bg-emerald-600 text-emerald-300 px-3 py-1 rounded font-bold uppercase">Listar Modelos</button>
                </div>
            </div>
            <div class="table-container">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="text-[9px] text-slate-400 uppercase tracking-wider font-bold">
                        <tr class="bg-slate-900/80">
                            <th class="px-4 py-4 pl-6">Mes</th>
                            <th class="px-4 py-4">Campaña</th>
                            <th class="px-4 py-4 text-center">Plataforma</th>
                            <th class="px-4 py-4 text-center">Tipo</th>
                            <th class="px-4 py-4 text-right">Plan</th>
                            <th class="px-4 py-4 text-right">Real</th>
                            <th class="px-4 py-4 text-right">Var %</th>
                            <th class="px-4 py-4 text-right">KPI Real</th>
                            <th class="px-4 py-4 text-center pr-6">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="table_body" class="divide-y divide-slate-800 text-[10px] text-slate-300"></tbody>
                </table>
            </div>
        </div>

        <div class="glass rounded-2xl p-6 border-l-4 border-purple-500 shadow-2xl relative overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 bg-purple-400 rounded-full animate-ping"></div>
                    <h3 class="text-lg font-black text-white uppercase tracking-widest">Inteligencia de Medios</h3>
                </div>
                <button onclick="forceAIUpdate()" class="text-[10px] bg-purple-900/50 hover:bg-purple-600 text-purple-200 px-3 py-1 rounded font-bold uppercase transition-all shadow-lg">Refrescar Análisis Estratégico</button>
            </div>
            <div id="ai_insights_container" class="text-sm text-slate-300 bg-slate-900/80 p-5 rounded-xl border border-slate-800 ai-response min-h-[100px]">
                <p class="italic text-slate-500">Cargando inteligencia...</p>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AIzaSyCYmlvcDxkaO5FUKzBIc-ixthXVsRttFSY"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCh5fkwDR1Jd1KJoPVEwY8gazJI85s2-wE",
            authDomain: "gpd-cc2026.firebaseapp.com",
            projectId: "gpd-cc2026",
            storageBucket: "gpd-cc2026.firebasestorage.app",
            databaseURL: "https://gpd-cc2026-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalDatabase = [];
        let currentClientData = []; 

        const clientSelector = document.getElementById('client_selector');
        const tableBody = document.getElementById('table_body');

        // --- FUNCIÓN 1: LISTAR MODELOS DINÁMICAMENTE ---
        async function getAvailableModels() {
            const container = document.getElementById('ai_insights_container');
            if (!GEMINI_API_KEY || GEMINI_API_KEY === "") {
                container.innerHTML = '<p class="text-red-400 text-xs font-bold">⚠️ Error: No hay API Key configurada.</p>';
                return null;
            }
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${GEMINI_API_KEY}`);
                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "Error de API");

                const models = result.models || [];
                // Buscamos preferiblemente modelos que soporten generación de contenido y sean estables
                const filteredModels = models.filter(m => m.supportedGenerationMethods.includes("generateContent"));
                
                // Priorizamos gemini-1.5-flash o gemini-1.5-pro si existen en la lista
                let bestModel = filteredModels.find(m => m.name.includes("1.5-flash")) || 
                                filteredModels.find(m => m.name.includes("pro")) || 
                                filteredModels[0];

                return bestModel ? bestModel.name : null;
            } catch (error) {
                container.innerHTML = `<p class="text-red-400 text-xs font-bold bg-red-900/20 p-2 rounded border border-red-500">⚠️ Error al listar modelos: ${error.message}</p>`;
                return null;
            }
        }

        // --- FUNCIÓN 2: EJECUTAR ANÁLISIS ---
        async function forceAIUpdate() {
            const container = document.getElementById('ai_insights_container');
            if(!GEMINI_API_KEY || GEMINI_API_KEY === "") {
                container.innerHTML = '<p class="text-red-400 text-xs font-bold">⚠️ Error: No hay API Key configurada.</p>';
                return;
            }
            if(currentClientData.length === 0) return;

            container.innerHTML = '<p class="animate-pulse text-purple-400 font-bold italic">🤖 Detectando modelo compatible y analizando cuenta...</p>';

            const dataSummary = currentClientData.map(c => {
                let varInv = c.spend_plan > 0 ? ((c.spend_real/c.spend_plan)*100).toFixed(0) : 0;
                return `- Campaña: "${c.name}" | Inv Real: ${varInv}% | KPI Real: ${c.kpi_real || 0}`;
            }).join('\n');

            const promptText = `Actúa como Director de Medios Senior. Analiza este rendimiento y da 3 insights breves, técnicos y accionables con emojis. Prioriza detectar sobregiros. Datos:\n${dataSummary}\nFormatea en HTML usando <ul>, <li> y <strong>. No uses markdown.`;

            try {
                const modelPath = await getAvailableModels();
                if (!modelPath) throw new Error("No se encontraron modelos compatibles en tu cuenta de Google.");

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${modelPath}:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                
                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "Error en generación");
                
                let text = result.candidates[0].content.parts[0].text;
                container.innerHTML = `<div class="text-[9px] text-slate-500 mb-2 font-mono uppercase">Motor: ${modelPath}</div>` + text.replace(/```html|```/g, '').trim();
                
            } catch (error) { 
                container.innerHTML = `<p class="text-red-400 text-xs font-bold bg-red-900/20 p-2 rounded border border-red-500">⚠️ Error de conexión IA: ${error.message}</p>`; 
            }
        }

        // --- LÓGICA DE BASE DE DATOS ---
        db.ref('lista_clientes').on('value', s => {
            const list = s.val() || [];
            const cur = clientSelector.value;
            clientSelector.innerHTML = '';
            list.forEach(c => {
                let opt = document.createElement('option'); opt.value = c; opt.textContent = c;
                clientSelector.appendChild(opt);
            });
            if(cur) clientSelector.value = cur;
            renderTable();
        });

        db.ref('data_marketing').on('value', s => {
            globalDatabase = s.val() ? Object.values(s.val()) : [];
            renderTable();
        });

        function renderTable() {
            tableBody.innerHTML = '';
            const cur = clientSelector.value;
            document.getElementById('lbl_client').innerText = cur || "Seleccione";
            currentClientData = globalDatabase.filter(c => c.client === cur);
            
            currentClientData.forEach(c => {
                const varInv = c.spend_plan > 0 ? (c.spend_real / c.spend_plan) * 100 : 0;
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/40 border-b border-slate-800/50";
                tr.innerHTML = `
                    <td class="px-4 py-3 pl-6">${c.month || 'N/A'}</td>
                    <td class="px-4 py-3 font-bold text-white">${c.name}</td>
                    <td class="px-4 py-3 text-center">${c.platform || '-'}</td>
                    <td class="px-4 py-3 text-center text-blue-300">${c.type || 'CPM'}</td>
                    <td class="px-4 py-3 text-right">$${(c.spend_plan||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-right text-blue-400 font-bold">$${(c.spend_real||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-right font-bold ${varInv > 105 ? 'text-red-400' : 'text-emerald-400'}">${varInv.toFixed(1)}%</td>
                    <td class="px-4 py-3 text-right font-mono">${(c.kpi_real||0).toLocaleString()}</td>
                    <td class="px-4 py-3 text-center pr-6"><button onclick="deleteRow(${c.id})" class="text-slate-600 hover:text-red-500">✕</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        function deleteRow(id) { if(confirm("¿Eliminar?")) { db.ref('data_marketing').child(Object.keys(globalDatabase).find(k => globalDatabase[k].id === id)).remove(); } }
        function addNewClient() { let n = prompt("Nuevo Cliente:"); if(n) db.ref('lista_clientes').once('value', s => { let l=s.val()||[]; l.push(n.toUpperCase()); db.ref('lista_clientes').set(l); }); }
        function deleteCurrentClient() { if(confirm("¿Borrar cliente?")) db.ref('lista_clientes').once('value', s => db.ref('lista_clientes').set((s.val()||[]).filter(c=>c!==clientSelector.value))); }
        clientSelector.onchange = renderTable;

        // Auto-análisis al cargar
        setTimeout(forceAIUpdate, 2000);
    </script>
</body>
</html>
