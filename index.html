<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPD | CC2026 AI GEN 3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .table-container { max-height: 58vh; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 20; background-color: #0f172a; border-bottom: 2px solid #1e293b; }
        
        /* Estilos IA Response Gemini 3 */
        .ai-response { line-height: 1.6; }
        .ai-response strong { color: #a855f7; font-weight: 800; }
        .ai-response ul { list-style-type: none; padding: 0; }
        .ai-response li { 
            background: rgba(168, 85, 247, 0.1); 
            margin-bottom: 0.75rem; 
            padding: 1rem; 
            border-radius: 12px; 
            border-left: 4px solid #a855f7;
        }
        .ai-header { background: linear-gradient(90deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-6">

    <div class="max-w-[1700px] mx-auto">
        <div class="glass flex flex-col md:flex-row justify-between items-center p-5 rounded-3xl mb-8 border-b-4 border-indigo-500 shadow-2xl">
            <div>
                <h1 class="text-3xl font-black text-white tracking-tighter">GPD <span class="text-indigo-400">CC2026</span></h1>
                <p class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] mt-1 italic">Quantum AI Intelligence Powered by Gemini 3 🚀</p>
            </div>
            <div class="flex items-center gap-4">
                <select id="client_selector" class="bg-slate-900 text-indigo-300 text-sm font-bold p-3 rounded-xl border border-slate-700 focus:ring-2 ring-indigo-500 outline-none min-w-[200px]"></select>
                <button onclick="addNewClient()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold px-4 py-3 rounded-xl transition-all shadow-lg hover:scale-105 active:scale-95">+</button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-8">
            <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                <div class="bg-slate-900/50 px-6 py-4 border-b border-slate-800 flex justify-between items-center">
                    <h2 class="text-xs font-bold text-slate-300 uppercase tracking-widest">Dataset: <span id="lbl_client" class="text-indigo-400">Cargando...</span></h2>
                    <div class="flex gap-2">
                         <button onclick="addNewCampaignManual()" class="text-[10px] bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg font-bold uppercase transition-all">+ Fila Manual</button>
                         <button onclick="clearCampaignsByClient()" class="text-[10px] bg-red-900/30 hover:bg-red-600 text-red-300 px-4 py-2 rounded-lg font-bold uppercase transition-all">Limpiar</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="w-full text-left border-collapse whitespace-nowrap">
                        <thead class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">
                            <tr>
                                <th class="px-6 py-5">Mes</th>
                                <th class="px-6 py-5">Campaña Estratégica</th>
                                <th class="px-6 py-5 text-center">Tipo</th>
                                <th class="px-6 py-5 text-right">Inversión Plan</th>
                                <th class="px-6 py-5 text-right text-indigo-400">Consumido Real</th>
                                <th class="px-6 py-5 text-right">Desviación %</th>
                                <th class="px-6 py-5 text-right text-emerald-400">KPI Real</th>
                                <th class="px-6 py-5 text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="table_body" class="divide-y divide-slate-800/50 text-xs text-slate-300"></tbody>
                    </table>
                </div>
            </div>

            <div class="glass rounded-3xl p-8 border-t-4 border-purple-500 shadow-2xl relative overflow-hidden bg-gradient-to-br from-slate-900 to-slate-950">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="p-3 bg-purple-500/20 rounded-2xl">
                            <svg class="w-6 h-6 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                        </div>
                        <h3 class="text-xl font-black ai-header uppercase tracking-tighter">Gemini 3 Deep Analysis</h3>
                    </div>
                    <button onclick="forceAIUpdate()" class="bg-purple-600 hover:bg-purple-500 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase transition-all shadow-[0_0_20px_rgba(168,85,247,0.4)]">Consultar Inteligencia 3.0</button>
                </div>
                <div id="ai_insights_container" class="ai-response min-h-[150px] bg-black/40 p-6 rounded-2xl border border-white/5">
                    <p class="text-slate-500 text-center italic">El modelo Gemini 3 está listo para auditar tus campañas actuales.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API KEY ACTUALIZADA
        const GEMINI_API_KEY = "AIzaSyCYmlvcDxkaO5FUKzBIc-ixthXVsRttFSY"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCh5fkwDR1Jd1KJoPVEwY8gazJI85s2-wE",
            authDomain: "gpd-cc2026.firebaseapp.com",
            projectId: "gpd-cc2026",
            storageBucket: "gpd-cc2026.firebasestorage.app",
            databaseURL: "https://gpd-cc2026-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalDatabase = [];
        let currentClientData = []; 

        const clientSelector = document.getElementById('client_selector');
        const tableBody = document.getElementById('table_body');

        db.ref('lista_clientes').on('value', s => {
            const list = s.val() || [];
            const cur = clientSelector.value;
            clientSelector.innerHTML = '';
            list.forEach(c => {
                let opt = document.createElement('option'); opt.value = c; opt.textContent = c;
                clientSelector.appendChild(opt);
            });
            if(cur) clientSelector.value = cur;
            renderTable();
        });

        db.ref('data_marketing').on('value', s => {
            globalDatabase = s.val() ? Object.values(s.val()) : [];
            renderTable();
        });

        function renderTable() {
            tableBody.innerHTML = '';
            const cur = clientSelector.value;
            document.getElementById('lbl_client').innerText = cur || "SELECCIONE CUENTA";
            currentClientData = globalDatabase.filter(c => c.client === cur);
            
            currentClientData.forEach(c => {
                const varInv = c.spend_plan > 0 ? (c.spend_real / c.spend_plan) * 100 : 0;
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="px-6 py-4 text-slate-500 font-medium">${c.month || 'N/A'}</td>
                    <td class="px-6 py-4 font-black text-white text-sm">${c.name}</td>
                    <td class="px-6 py-4 text-center"><span class="bg-indigo-500/10 text-indigo-400 px-2 py-1 rounded text-[10px] font-bold">${c.type || 'CPM'}</span></td>
                    <td class="px-6 py-4 text-right font-mono">$${(c.spend_plan||0).toLocaleString()}</td>
                    <td class="px-6 py-4 text-right text-indigo-300 font-black font-mono">$${(c.spend_real||0).toLocaleString()}</td>
                    <td class="px-6 py-4 text-right font-black ${varInv > 105 ? 'text-red-400' : 'text-emerald-400'}">${varInv.toFixed(1)}%</td>
                    <td class="px-6 py-4 text-right font-mono text-emerald-300">${(c.kpi_real||0).toLocaleString()}</td>
                    <td class="px-6 py-4 text-center"><button onclick="deleteRow(${c.id})" class="hover:text-red-500 transition-colors">✕</button></td>
                `;
                tableBody.appendChild(tr);
            });
        }

        async function forceAIUpdate() {
            const container = document.getElementById('ai_insights_container');
            if(!currentClientData.length) return alert("Carga datos para iniciar el análisis.");
            
            container.innerHTML = '<div class="flex flex-col items-center justify-center gap-3"><div class="w-8 h-8 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div><p class="text-purple-400 font-black text-xs animate-pulse">GEMINI 3 PRO ESTÁ PROCESANDO TU DATASET...</p></div>';
            
            const resumen = currentClientData.map(c => `- ${c.name}: Plan $${c.spend_plan}, Real $${c.spend_real}, Pacing: ${((c.spend_real/(c.spend_plan||1))*100).toFixed(1)}%`).join('\n');
            const prompt = `Analiza estas métricas de marketing como un Media Auditor de élite. Identifica 3 áreas críticas de mejora (presupuesto, desviación o eficiencia). Usa un tono profesional y directo. Formato HTML (ul, li con iconos, strong para énfasis):\n${resumen}`;

            try {
                // USANDO EL MODELO GEMINI 3 PRO ACTUALIZADO AL 2026
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                container.innerHTML = data.candidates[0].content.parts[0].text.replace(/```html|```/g, '');
            } catch (e) {
                container.innerHTML = `<div class="p-4 bg-red-950/20 border border-red-500/50 rounded-2xl text-red-400 text-xs font-bold text-center">⚠️ ERROR EN NÚCLEO GEMINI 3: ${e.message}</div>`;
            }
        }

        function deleteRow(id) { if(confirm("¿Eliminar registro?")) { globalDatabase = globalDatabase.filter(x => x.id != id); db.ref('data_marketing').set(globalDatabase); } }
        function addNewClient() { let n = prompt("Nombre del Cliente:"); if(n) db.ref('lista_clientes').once('value', s => { let l=s.val()||[]; l.push(n.toUpperCase()); db.ref('lista_clientes').set(l); }); }
        function deleteCurrentClient() { if(confirm(`¿Borrar permanentemente ${clientSelector.value}?`)) db.ref('lista_clientes').once('value', s => db.ref('lista_clientes').set((s.val()||[]).filter(c=>c!==clientSelector.value))); }
        function addNewCampaignManual() { const name = prompt("Nombre de la Campaña:"); if(name) { globalDatabase.push({ id: Date.now(), client: clientSelector.value, name, month: "N/A", spend_plan: 0, spend_real: 0, kpi_real: 0 }); db.ref('data_marketing').set(globalDatabase); } }
        function clearCampaignsByClient() { if(confirm("¿Vaciar tabla?")) { globalDatabase = globalDatabase.filter(x => x.client !== clientSelector.value); db.ref('data_marketing').set(globalDatabase); } }
        clientSelector.onchange = renderTable;
    </script>
</body>
</html>
