<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPD | CC2026 AI PRO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { background-color: #030712; color: #f8fafc; font-family: 'Segoe UI', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .table-container { max-height: 55vh; overflow-y: auto; }
        th { position: sticky; top: 0; z-index: 10; background-color: #111827; }
        .badge-active { background: #065f46; color: #34d399; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: bold; }
        input[type="number"], input[type="text"], select { 
            background: #0f172a; color: white; border: 1px solid #334155; 
            border-radius: 4px; padding: 2px 4px; font-size: 10px; outline: none;
        }
        select option { background-color: #0f172a; }
        
        /* Estilos para la respuesta de la IA */
        .ai-response strong { color: #c084fc; font-weight: 900; }
        .ai-response p { margin-bottom: 0.75rem; }
        .ai-response ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 0.75rem; color: #cbd5e1; }
        .ai-response li { margin-bottom: 0.4rem; line-height: 1.4; }
    </style>
</head>
<body class="p-4 md:p-6">

    <div class="max-w-[1800px] mx-auto">
        <div class="glass flex flex-col md:flex-row justify-between items-center p-4 rounded-2xl mb-6 border-b-4 border-blue-600 gap-4 shadow-2xl">
            <div>
                <h1 class="text-2xl font-black text-white tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-white to-blue-400">GPD <span class="text-blue-500">CC2026</span></h1>
                <p class="text-slate-400 text-[10px] font-bold uppercase tracking-widest mt-1">AI PRO Powered Dashboard ✨</p>
            </div>
            <div class="flex items-center gap-3 bg-slate-900 p-2 rounded-xl border border-slate-700 shadow-inner">
                <select id="client_selector" class="bg-black text-blue-400 text-sm font-bold p-2 rounded-lg border border-slate-800 focus:border-blue-500 min-w-[150px]"></select>
                <button onclick="addNewClient()" class="bg-slate-800 hover:bg-blue-600 text-white font-bold w-10 h-10 rounded-lg transition-all shadow-lg" title="Nuevo Cliente">+</button>
                <button onclick="deleteCurrentClient()" class="bg-slate-800 hover:bg-red-600 text-red-400 hover:text-white font-bold w-10 h-10 rounded-lg transition-all shadow-lg" title="Borrar Cliente">✕</button>
            </div>
        </div>

        <div class="glass rounded-2xl p-6 border-l-4 border-purple-500 shadow-2xl relative overflow-hidden">
            <div class="flex items-center justify-between mb-4">
                <div class="flex items-center gap-2">
                    <svg class="w-6 h-6 text-purple-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                    <h3 class="text-lg font-black text-white uppercase tracking-widest">Gemini PRO Analysis</h3>
                </div>
                <button onclick="forceAIUpdate()" class="text-[10px] bg-purple-900/50 hover:bg-purple-600 text-purple-200 px-3 py-1 rounded font-bold uppercase transition-all shadow-lg">Refrescar Análisis Estratégico</button>
            </div>
            <div id="ai_insights_container" class="text-sm text-slate-300 bg-slate-900/80 p-5 rounded-xl border border-slate-800 ai-response">
                <p class="italic text-slate-500">Cargando inteligencia...</p>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN DE ACCESOS
        const GEMINI_API_KEY = "AIzaSyCYmlvcDxkaO5FUKzBIc-ixthXVsRttFSY"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCh5fkwDR1Jd1KJoPVEwY8gazJI85s2-wE",
            authDomain: "gpd-cc2026.firebaseapp.com",
            projectId: "gpd-cc2026",
            storageBucket: "gpd-cc2026.firebasestorage.app",
            messagingSenderId: "800603232583",
            appId: "1:800603232583:web:9a24bcb6652b9b65849462",
            databaseURL: "https://gpd-cc2026-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let globalDatabase = [];
        let currentClientData = []; 
        
        const clientSelector = document.getElementById('client_selector');
        const tableBody = document.getElementById('table_body');

        // --- MANEJO DE CLIENTES ---
        db.ref('lista_clientes').on('value', s => {
            const list = s.val() || [];
            const cur = clientSelector.value;
            clientSelector.innerHTML = '';
            list.forEach(c => {
                let opt = document.createElement('option'); opt.value = c; opt.textContent = c;
                clientSelector.appendChild(opt);
            });
            if(cur) clientSelector.value = cur;
            renderTable();
        });

        // --- CARGA DE ARCHIVOS ---
        function handleFile(file, type) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                const matrix = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 1});
                
                if(type === 'planner') {
                    const tasa = parseFloat(matrix[1] ? matrix[1][4] : 61.84) || 61.84;
                    const rows = matrix.slice(7).map(r => ({
                        mes: r[0], name: r[1], platform: r[3], type: r[4], 
                        plan_dop: r[9], kpi_p: r[10], tasa: tasa
                    }));
                    syncData(rows, 'planner');
                } else {
                    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {header: 0});
                    syncData(rows, 'real');
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // --- GEMINI PRO INTEGRATION (CON DETECTOR DE ERRORES) ---
        async function forceAIUpdate() {
            const container = document.getElementById('ai_insights_container');
            
            if(!GEMINI_API_KEY || GEMINI_API_KEY === "") {
                container.innerHTML = '<p class="text-red-400 text-xs font-bold">⚠️ Error: No hay API Key configurada.</p>';
                return;
            }
            
            if(currentClientData.length === 0) return;

            container.innerHTML = '<p class="animate-pulse text-purple-400 font-bold italic">🤖 Gemini PRO está analizando la cuenta estratégicamente...</p>';

            const dataSummary = currentClientData.map(c => {
                let varInv = c.spend_plan > 0 ? ((c.spend_real/c.spend_plan)*100).toFixed(0) : 0;
                let logKpi = c.kpi_plan > 0 ? ((c.calculated_kpi/c.kpi_plan)*100).toFixed(0) : 0;
                return `- Campaña: "${c.name}" (${c.platform}) | Compra: ${c.type} | Inv: ${varInv}% | Logro KPI: ${logKpi}%`;
            }).join('\n');

            const promptText = `
                Actúa como Director de Medios Senior. Analiza este rendimiento y da 3 insights breves, técnicos y accionables con emojis. 
                Prioriza detectar sobregiros o bajos logros de KPI.
                Datos de la cuenta:\n${dataSummary}\n
                Formatea en HTML usando <ul>, <li> y <strong> para nombres de campañas. No uses markdown.
            `;

            try {
                // AQUÍ ESTÁ EL AJUSTE FINAL: gemini-3.1-pro
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptText }] }] })
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error?.message || "Error desconocido de los servidores de Google");
                }
                
                let text = result.candidates[0].content.parts[0].text;
                container.innerHTML = text.replace(/```html/g, '').replace(/```/g, '').trim();
                
            } catch (error) { 
                console.error("AI Error:", error);
                container.innerHTML = `<p class="text-red-400 text-xs font-bold bg-red-900/20 p-2 rounded border border-red-500">⚠️ Error de conexión IA: ${error.message}</p>`; 
            }
        }

        function renderTable() {
            tableBody.innerHTML = '';
            const cur = clientSelector.value;
            currentClientData = [];

            globalDatabase.filter(c => c.client === cur).forEach(c => {
                let t = (c.type || "CPM").toUpperCase();
                let actualKpi = 0;

                if (t === "CPM" || t === "CPMS") actualKpi = c.metric_imp || c.kpi_real || 0;
                else if (t === "CPC") actualKpi = c.metric_clicks || c.kpi_real || 0;
                else if (t === "CPV" || t === "VTR") actualKpi = c.metric_views || c.kpi_real || 0;
                else if (t === "CPL") actualKpi = c.metric_leads || c.kpi_real || 0;
                else if (t === "CPA" || t === "ROAS") actualKpi = c.metric_conv || c.kpi_real || 0;
                else actualKpi = c.kpi_real || c.metric_conv || c.metric_clicks || c.metric_imp || 0;

                c.calculated_kpi = actualKpi; 
                currentClientData.push(c);

                const varInv = c.spend_plan > 0 ? (c.spend_real / c.spend_plan) * 100 : 0;
                const logKpi = c.kpi_plan > 0 ? (actualKpi / c.kpi_plan) * 100 : 0;

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-800/60 transition-all border-b border-slate-800/50";
                tr.innerHTML = `
                    <td class="px-4 py-3 pl-6"><select onchange="updateValue(${c.id}, 'month', this.value)" class="bg-transparent border-none w-20 focus:ring-1 ring-blue-500 text-slate-300 font-bold">${monthsList.map(m => `<option value="${m}" ${c.month===m?'selected':''}>${m}</option>`).join('')}</select></td>
                    <td class="px-4 py-3 font-bold text-white max-w-[200px] truncate" title="${c.name}">${c.name}</td>
                    <td class="px-4 py-3 text-center"><select onchange="handlePlatformChange(${c.id}, this.value)" class="text-[10px] bg-transparent border-none text-center text-slate-300 font-bold w-28">${plataformasList.map(p => `<option value="${p}" ${c.platform==p?'selected':''}>${p}</option>`).join('')}<option value="NEW">+ Añadir</option></select></td>
                    <td class="px-4 py-3 text-center"><select onchange="handleTypeChange(${c.id}, this.value)" class="text-[10px] font-bold text-blue-300 bg-transparent border-none">${tiposCompra.map(tc => `<option value="${tc}" ${t==tc?'selected':''}>${tc}</option>`).join('')}<option value="NEW">+ Añadir</option></select></td>
                    <td class="px-4 py-3 text-right"><input type="number" step="0.01" value="${(c.spend_plan||0).toFixed(2)}" onchange="updateValue(${c.id}, 'spend_plan', this.value)" class="text-right text-emerald-400 font-bold w-20"></td>
                    <td class="px-4 py-3 text-right font-mono text-blue-400 font-bold">$${(c.spend_real||0).toLocaleString(undefined,{minimumFractionDigits:2})}</td>
                    <td class="px-4 py-3 text-right font-bold ${varInv > 105 ? 'text-red-400' : 'text-slate-300'}">${varInv.toFixed(1)}%</td>
                    <td class="px-4 py-3 text-right"><input type="number" value="${c.kpi_plan}" onchange="updateValue(${c.id}, 'kpi_plan', this.value)" class="text-right text-slate-400 w-20"></td>
                    <td class="px-4 py-3 text-right font-mono text-emerald-300 font-bold">${actualKpi.toLocaleString()}</td>
                    <td class="px-4 py-3 text-right font-black text-emerald-500">${logKpi.toFixed(1)}%</td>
                    <td class="px-4 py-3 text-center"><span class="badge-active">ACTIVO</span></td>
                    <td class="px-4 py-3 text-center pr-6"><button onclick="deleteRow(${c.id})" class="text-slate-600 hover:text-red-500 transition-colors">✕</button></td>
                `;
                tableBody.appendChild(tr);
            });

            clearTimeout(aiTimeout);
            aiTimeout = setTimeout(() => forceAIUpdate(), 2000);
        }

    </script>
</body>
</html>
